services:
  db:
    image: postgres:16
    container_name: przedszkole-db
    environment:
      POSTGRES_DB: przedszkole
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d przedszkole"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: przedszkole-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/przedszkole
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-dev-only-change-me-123456}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: przedszkole-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  pgdata:
